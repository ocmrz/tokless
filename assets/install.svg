<svg xmlns="http://www.w3.org/2000/svg" width="780" height="344" viewBox="0 0 780 344" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14.5">
  <rect x="0" y="0" width="780" height="344" rx="10" fill="#0d1117"/>
  <rect x="0" y="0" width="780" height="34" rx="10" fill="#161b22"/>
  <rect x="0" y="22" width="780" height="12" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="390" y="22" fill="#8b949e" text-anchor="middle" font-size="12.5">tokless — install</text>

  <g xml:space="preserve">
    <text x="22" y="66"><tspan fill="#3fb950">$ </tspan><tspan fill="#c9d1d9">curl -fsSL https://raw.githubusercontent.com/HoangP8/tokless/main/scripts/install.sh | bash</tspan></text>

    <text x="22" y="112"><tspan fill="#58a6ff" font-weight="bold">? </tspan><tspan fill="#f0f6fc" font-weight="bold">Select agents to install tokless</tspan></text>
    <text x="22" y="134" fill="#6e7681">  ↑/↓ move · &lt;space&gt; select · &lt;a&gt; all · &lt;enter&gt; confirm</text>

    <text y="164"><tspan x="30" fill="#58a6ff">❯</tspan><tspan x="52" fill="#3fb950">◉</tspan><tspan x="78" fill="#f0f6fc" font-weight="bold">Claude Code</tspan><tspan x="210" fill="#3fb950">[READY]</tspan></text>
    <text y="188"><tspan x="52" fill="#3fb950">◉</tspan><tspan x="78" fill="#f0f6fc" font-weight="bold">OpenCode</tspan><tspan x="210" fill="#3fb950">[READY]</tspan></text>
    <text y="212"><tspan x="52" fill="#6e7681">◯</tspan><tspan x="78" fill="#c9d1d9">Codex</tspan><tspan x="210" fill="#3fb950">[READY]</tspan></text>
    <text y="236"><tspan x="52" fill="#3fb950">◉</tspan><tspan x="78" fill="#f0f6fc" font-weight="bold">Antigravity</tspan><tspan x="210" fill="#3fb950">[READY]</tspan><tspan x="290" fill="#6e7681">cli+desktop</tspan></text>

    <text x="22" y="282"><tspan fill="#3fb950">✔ </tspan><tspan fill="#c9d1d9">Wired RTK · Caveman · CodeGraph · Context-Mode into 3 agents</tspan></text>
    <text x="22" y="306"><tspan fill="#8b949e">  Restart your agents to pick up the new config.</tspan></text>
    <text x="22" y="330"><tspan fill="#3fb950">$ </tspan><tspan fill="#c9d1d9">▋</tspan></text>
  </g>
</svg>
