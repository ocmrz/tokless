name: ci

# Runs on every push to main and every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

      # Parse-validate the PowerShell installer on a real Windows runner —
      # it cannot be checked on the linux dev machine.
      - name: Validate PowerShell scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errs = $null
          $tokens = $null
          [System.Management.Automation.Language.Parser]::ParseFile("$PWD/scripts/install.ps1", [ref]$tokens, [ref]$errs) | Out-Null
          if ($errs) { $errs | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Output "install.ps1 parses OK"
