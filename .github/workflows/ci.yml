name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: |
          npm install -g context-mode@latest --silent || true
          go test -count=1 ./...

      - name: Build
        run: go build ./...

      - name: Validate PowerShell scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errs = $null
          $tokens = $null
          [System.Management.Automation.Language.Parser]::ParseFile("$PWD/scripts/install.ps1", [ref]$tokens, [ref]$errs) | Out-Null
          if ($errs) { $errs | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Output "install.ps1 parses OK"
